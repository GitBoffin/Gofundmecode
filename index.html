<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoFundMe — Promo Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0f0d;
      --surface: #111a14;
      --card: #162019;
      --border: #1e3024;
      --green: #00e676;
      --green-dim: #00b85433;
      --green-mid: #00c853;
      --red: #ff5252;
      --red-dim: #ff525222;
      --yellow: #ffd740;
      --text: #e8f5e9;
      --muted: #5a7a62;
      --font-ui: 'Syne', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,230,118,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,230,118,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px 60px; }

    /* ─── HEADER ─── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 36px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 42px; height: 42px;
      background: var(--green);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
    .logo-text span { color: var(--green); }

    .badge {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 100px;
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid var(--green);
      letter-spacing: 1px;
    }

    /* ─── STATS ROW ─── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px 24px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: var(--green); }

    .stat-card::after {
      content: '';
      position: absolute;
      top: -20px; right: -20px;
      width: 80px; height: 80px;
      border-radius: 50%;
      opacity: 0.06;
    }
    .stat-card.total::after { background: var(--green); }
    .stat-card.active::after { background: var(--green); }
    .stat-card.used::after { background: var(--red); }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .stat-value {
      font-family: var(--font-mono);
      font-size: 36px;
      font-weight: 600;
      line-height: 1;
    }

    .stat-card.total .stat-value { color: var(--text); }
    .stat-card.active .stat-value { color: var(--green); }
    .stat-card.used .stat-value { color: var(--red); }

    /* ─── GENERATE SECTION ─── */
    .gen-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 28px 24px;
      margin-bottom: 32px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: '';
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .gen-controls {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .value-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      padding: 11px 16px;
      cursor: pointer;
      outline: none;
      flex: 1;
      min-width: 160px;
    }
    .value-select:focus { border-color: var(--green); }

    .gen-btn {
      background: var(--green);
      color: #0a0f0d;
      border: none;
      border-radius: 10px;
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 800;
      padding: 11px 28px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.15s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .gen-btn:hover { background: #00ff85; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,230,118,0.4); }
    .gen-btn:active { transform: translateY(0); }

    .copy-all-btn {
      background: transparent;
      color: var(--green);
      border: 1px solid var(--green);
      border-radius: 10px;
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 700;
      padding: 11px 22px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .copy-all-btn:hover { background: var(--green-dim); }

    /* ─── NEW CODES PREVIEW ─── */
    .new-codes {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
    }

    .new-code-row {
      background: var(--green-dim);
      border: 1px solid #00e67644;
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: slideIn 0.3s ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .new-code-text {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--green);
      font-weight: 600;
    }

    .new-code-val {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--green-mid);
    }

    .copy-one {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.15s;
      font-size: 16px;
    }
    .copy-one:hover { color: var(--green); }
    .copy-one.copied { color: var(--green); }

    /* ─── FILTER BAR ─── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 100px;
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      padding: 7px 18px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--green); color: var(--green); }
    .filter-btn.active-filter { background: var(--green); color: #0a0f0d; border-color: var(--green); }

    .search-box {
      margin-left: auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 8px 14px;
      outline: none;
      width: 220px;
    }
    .search-box:focus { border-color: var(--green); }
    .search-box::placeholder { color: var(--muted); }

    /* ─── TABLE ─── */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead tr {
      border-bottom: 1px solid var(--border);
    }

    th {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 16px 20px;
      text-align: left;
    }

    tbody tr {
      border-bottom: 1px solid #1a2a1e;
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #1a2a1e; }

    td {
      padding: 14px 20px;
      font-size: 13px;
      vertical-align: middle;
    }

    .code-cell {
      font-family: var(--font-mono);
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .status-pill.active {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid #00e67633;
    }

    .status-pill.used {
      background: var(--red-dim);
      color: var(--red);
      border: 1px solid #ff525222;
    }

    .status-pill::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .status-pill.active::before { background: var(--green); }
    .status-pill.used::before { background: var(--red); }

    .value-cell {
      font-family: var(--font-mono);
      color: var(--yellow);
      font-weight: 600;
    }

    .used-by-cell {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .date-cell {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
    }

    .action-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .action-btn:hover { border-color: var(--green); color: var(--green); }
    .action-btn.done { color: var(--green); border-color: var(--green); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--green);
      color: #0a0f0d;
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 700;
      padding: 12px 22px;
      border-radius: 12px;
      z-index: 9999;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 640px) {
      .stats { grid-template-columns: 1fr; }
      .search-box { width: 100%; margin-left: 0; }
      th:nth-child(4), td:nth-child(4),
      th:nth-child(5), td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">💸</div>
      <div class="logo-text">GoFundMe <span>Admin</span></div>
    </div>
    <div class="badge">PROMO MANAGER</div>
  </header>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card total">
      <div class="stat-label">Total Codes</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat-card active">
      <div class="stat-label">Active</div>
      <div class="stat-value" id="stat-active">0</div>
    </div>
    <div class="stat-card used">
      <div class="stat-label">Used</div>
      <div class="stat-value" id="stat-used">0</div>
    </div>
  </div>

  <!-- GENERATE SECTION -->
  <div class="gen-section">
    <div class="section-title">Generate New Codes</div>
    <div class="gen-controls">
      <select class="value-select" id="value-select">
        <option value="random">Random value ($60k–$99k)</option>
        <option value="60000">$60,000</option>
        <option value="65000">$65,000</option>
        <option value="70000">$70,000</option>
        <option value="75000">$75,000</option>
        <option value="80000">$80,000</option>
        <option value="85000">$85,000</option>
        <option value="90000">$90,000</option>
        <option value="95000">$95,000</option>
        <option value="99000">$99,000</option>
      </select>
      <button class="gen-btn" onclick="generateCodes()">
        ⚡ Generate 5 Codes
      </button>
      <button class="copy-all-btn" id="copy-new-btn" style="display:none" onclick="copyNewCodes()">
        📋 Copy New Codes
      </button>
    </div>
    <div class="new-codes" id="new-codes-preview"></div>
  </div>

  <!-- ALL CODES TABLE -->
  <div class="section-title" style="margin-bottom: 16px;">All Promo Codes</div>

  <div class="filter-bar">
    <button class="filter-btn active-filter" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" onclick="setFilter('used', this)">Used</button>
    <input class="search-box" id="search-box" placeholder="Search codes..." oninput="renderTable()" />
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Promo Code</th>
          <th>Value</th>
          <th>Status</th>
          <th>Used By</th>
          <th>Generated</th>
          <th>Copy</th>
        </tr>
      </thead>
      <tbody id="codes-tbody"></tbody>
    </table>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ─── STORAGE KEYS ───
  const ADMIN_STORE_KEY = 'gofundme_admin_codes';

  // ─── WORD LISTS FOR CODE GENERATION ───
  const WORDS = ['APEX','BOLT','CREST','DAWN','EDGE','FLUX','GLOW','HALO','ICON','JADE','LIFT','MINT','NOVA','PURE','RISE','STAR','SYNC','VIBE','WAVE','ZEAL','ECHO','FUSE','GRID','HAZE','IRIS','KITE','LOOM','MELD','NODE','OPAL','PLEX','QUAD','REEF','SILO','TUSK','UNIT','VALE','WEFT','XEON','YOKE','ZINC','ALPH','BREX','CAYO','DUSK','EONS','FAWN','GUST','HEXA','JOLT'];
  const NUMS  = ['1234','5678','9012','3456','7890','2468','1357','8642','0987','6543','1928','3746','5082','7314','4609'];

  function randCode() {
    const pool = Math.random() < 0.5 ? WORDS : NUMS;
    const suffix = pool[Math.floor(Math.random() * pool.length)];
    return `PRIME-GOFUND-${suffix}`;
  }

  function randValue(fixed) {
    if (fixed !== 'random') return parseInt(fixed);
    const vals = [60000,61000,62500,63000,64000,65000,66000,67000,68000,69000,70000,71000,72000,73000,74000,75000,76000,77000,78000,79000,80000,81000,82000,83500,84000,85000,86000,87000,88000,89000,90000,91000,92000,93000,94000,95000,96000,97000,98000,99000,99500];
    return vals[Math.floor(Math.random() * vals.length)];
  }

  // ─── LOAD / SAVE ───
  function loadCodes() {
    try { return JSON.parse(localStorage.getItem(ADMIN_STORE_KEY)) || []; }
    catch { return []; }
  }

  function saveCodes(codes) {
    localStorage.setItem(ADMIN_STORE_KEY, JSON.stringify(codes));
  }

  // ─── SYNC USED STATUS from main app localStorage ───
  function syncUsedStatus(codes) {
    return codes.map(c => {
      const usedKey = `promo_used_${c.code.toUpperCase()}`;
      const usedBy = localStorage.getItem(usedKey);
      if (usedBy) {
        return { ...c, status: 'used', usedBy };
      }
      return { ...c, status: 'active', usedBy: c.usedBy || '' };
    });
  }

  function init() {
    let codes = loadCodes();
    // Keep only admin-generated codes — wipe any old hardcoded seeds
    codes = codes.filter(c => c.adminGenerated === true);
    codes = syncUsedStatus(codes);
    saveCodes(codes);
    updateStats(codes);
    renderTable();
  }

  // ─── GENERATE ───
  let lastGenerated = [];

  function generateCodes() {
    const fixedVal = document.getElementById('value-select').value;
    let codes = loadCodes();
    const existing = new Set(codes.map(c => c.code));
    const newCodes = [];

    let attempts = 0;
    while (newCodes.length < 5 && attempts < 200) {
      attempts++;
      const code = randCode();
      if (!existing.has(code) && !newCodes.find(n => n.code === code)) {
        newCodes.push({
          code,
          value: randValue(fixedVal),
          status: 'active',
          usedBy: '',
          adminGenerated: true,
          generatedAt: new Date().toISOString()
        });
      }
    }

    codes = [...newCodes, ...codes];
    saveCodes(codes);
    lastGenerated = newCodes;
    renderNewPreview(newCodes);
    updateStats(syncUsedStatus(codes));
    renderTable();
    showToast(`✓ ${newCodes.length} new codes generated`);
  }

  function renderNewPreview(newCodes) {
    const el = document.getElementById('new-codes-preview');
    el.innerHTML = newCodes.map((c, i) => `
      <div class="new-code-row" style="animation-delay:${i*60}ms">
        <div>
          <div class="new-code-text">${c.code}</div>
          <div class="new-code-val">$${c.value.toLocaleString()}</div>
        </div>
        <button class="copy-one" onclick="copySingle('${c.code}', this)" title="Copy code">📋</button>
      </div>
    `).join('');
    document.getElementById('copy-new-btn').style.display = 'block';
  }

  function copyNewCodes() {
    const text = lastGenerated.map(c => `${c.code} — $${c.value.toLocaleString()}`).join('\n');
    copyText(text).then(() => showToast('✓ New codes copied!'));
  }

  // ─── FILTER + RENDER TABLE ───
  let currentFilter = 'all';

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter'));
    btn.classList.add('active-filter');
    renderTable();
  }

  function renderTable() {
    let codes = syncUsedStatus(loadCodes());
    saveCodes(codes);
    updateStats(codes);

    const search = (document.getElementById('search-box').value || '').toLowerCase();

    let filtered = codes.filter(c => {
      if (currentFilter === 'active' && c.status !== 'active') return false;
      if (currentFilter === 'used' && c.status !== 'used') return false;
      if (search && !c.code.toLowerCase().includes(search) && !(c.usedBy || '').toLowerCase().includes(search)) return false;
      return true;
    });

    const tbody = document.getElementById('codes-tbody');

    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="icon">🔍</div><p>No codes found</p></div></td></tr>`;
      return;
    }

    tbody.innerHTML = filtered.map((c, i) => `
      <tr>
        <td style="color:var(--muted);font-family:var(--font-mono);font-size:11px">${i + 1}</td>
        <td>
          <div class="code-cell">${c.code}</div>
        </td>
        <td class="value-cell">$${c.value.toLocaleString()}</td>
        <td>
          <span class="status-pill ${c.status}">
            ${c.status === 'active' ? 'ACTIVE' : 'USED'}
          </span>
        </td>
        <td class="used-by-cell">${c.usedBy || '—'}</td>
        <td class="date-cell">${formatDate(c.generatedAt)}</td>
        <td>
          <button class="action-btn" onclick="copySingle('${c.code}', this)" title="Copy">📋</button>
        </td>
      </tr>
    `).join('');
  }

  function updateStats(codes) {
    const total = codes.length;
    const used = codes.filter(c => c.status === 'used').length;
    const active = total - used;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-active').textContent = active;
    document.getElementById('stat-used').textContent = used;
  }

  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' });
  }

  // ─── COPY ───
  function copyText(text) {
    // Try modern clipboard API first
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
    }
    fallbackCopy(text);
    return Promise.resolve();
  }

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
  }

  function copySingle(code, btn) {
    copyText(code).then(() => {
      const orig = btn.textContent;
      btn.textContent = '✓';
      btn.classList.add('done', 'copied');
      setTimeout(() => {
        btn.textContent = orig;
        btn.classList.remove('done', 'copied');
      }, 1800);
      showToast(`✓ Copied: ${code}`);
    });
  }

  // ─── TOAST ───
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ─── INIT ───
  init();

  // Auto-refresh every 10s to pick up new usage from main app
  setInterval(() => renderTable(), 10000);
</script>
</body>
</html>
